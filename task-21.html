<script type="text/javascript">
var electric;
var water;
var i;

electric = ["pikachu", "raichu", "elekid"];
water = ["squirtle", "lapras", "greninja"];

console.log("Electric type pokemon:");
for (i = 0; i < electric.length; i++) {
    console.log("- " + electric[i]);
}

console.log("Water type pokemon:");
for (i = 0; i < water.length; i++) {
    console.log("- " + water[i]);
}
</script>
