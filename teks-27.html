<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Java Script</title>
</head>
<body>

<script type="text/javascript">
function showText(text, jumlah) {
    var i;
    for (i = 0; i < jumlah; i++) {
        console.log(text);
    }
}

// contoh pemanggilan function
showText("I Love Javascript", 10);
showText("Hello World", 5);
</script>

</body>
</html>
