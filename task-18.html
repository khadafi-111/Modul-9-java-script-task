<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Java Script</title>
</head>
<body>

<script type="text/javascript">
var angka;
var total;

total = 0;
angka = 0;

while (angka != -1) {
    angka = Number(prompt("Masukkan angka (-1 untuk berhenti)"));

    if (angka != -1) {
        total = total + angka;
    }
}

console.log('Jumlah total = ' + total);
</script>

</body>
</html>
