<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Java Script</title>
</head>
<body>

<script type="text/javascript">
var electric;
var water;
var counter;

electric = ["pikachu", "raichu", "elekid"];
water = ["squirtle", "lapras", "greninja"];

counter = 0;
while (counter < electric.length) {
    console.log(electric[counter] + " adalah Electric type");
    counter += 1;
}

counter = 0;
while (counter < water.length) {
    console.log(water[counter] + " adalah Water type");
    counter += 1;
}
</script>

</body>
</html>
