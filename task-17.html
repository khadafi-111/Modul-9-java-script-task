<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Java Script</title>
</head>
<body>

<script type="text/javascript">
var counter;
var total;
var angka;

counter = 0;
total = 0;

while (counter < 10) {
    angka = Number(prompt("Masukkan angka ke-" + (counter + 1)));
    total = total + angka;
    counter += 1;
}

console.log('Jumlah total = ' + total);
</script>

</body>
</html>
