<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Java Script</title>
</head>
<body>

  First Name: <input type="text" id="firstName"> <br><br>
  Last Name: <input type="text" id="lastName"> <br><br>
  Country: <input type="text" id="country"> <br><br>
  Email: <input type="text" id="email"> <br><br>
  Phone: <input type="text" id="phone"> <br><br>
  Password: <input type="password" id="password"> <br><br>
  Confirm Password: <input type="password" id="confirmPassword"> <br><br>
  Terms and Condition: <input type="checkbox" id="terms"> <br><br>

  <button onclick="handleCreate()">Create</button>

  <p id="result"></p>

  <script type="text/javascript">
    function handleCreate() {
      var firstName       = document.getElementById('firstName').value;
      var lastName        = document.getElementById('lastName').value;
      var country         = document.getElementById('country').value;
      var email           = document.getElementById('email').value;
      var phone           = document.getElementById('phone').value;
      var password        = document.getElementById('password').value;
      var confirmPassword = document.getElementById('confirmPassword').value;
      var terms           = document.getElementById('terms').checked;

      var passwordStatus = '';
      if (password === confirmPassword) {
        passwordStatus = 'Password sama dengan Confirm Password';
      } else {
        passwordStatus = 'Password tidak sama dengan Confirm Password';
      }

      document.getElementById('result').innerHTML =
        'First Name: ' + firstName + '<br>' +
        'Last Name: ' + lastName + '<br>' +
        'Country: ' + country + '<br>' +
        'Email: ' + email + '<br>' +
        'Phone: ' + phone + '<br>' +
        'Terms: ' + (terms ? 'Disetujui' : 'Tidak Disetujui') + '<br>' +
        passwordStatus;
    }
  </script>

</body>
</html>
