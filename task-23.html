<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Java Script</title>
</head>
<body>
  <script type="text/javascript">
    var diceResults = [];

    for (var i = 0; i < 10; i++) {
      var roll = Math.floor(Math.random() * 6) + 1;
      diceResults.push(roll);
    }

    console.log(diceResults);
  </script>
</body>
</html>
